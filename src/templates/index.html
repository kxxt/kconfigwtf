<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }}</title>
    <link rel="stylesheet" href="{{ asset_prefix }}styles.css">
    <script defer src="{{ asset_prefix }}app.js" data-index-manifest="{{ asset_prefix }}{{ manifest_file }}"></script>
  </head>
  <body>
    <main class="shell">
      <section class="lookup">
        <div>
          <h1>{{ site_title }}</h1>
          <p class="lede">Find Linux kernel package configs by Kconfig entry.</p>
        </div>
        <form id="search-form" class="search" role="search">
          <label for="config-input">Kernel config</label>
          <div class="search-row">
            <input
              id="config-input"
              name="config"
              type="search"
              list="config-options"
              autocomplete="off"
              spellcheck="false"
              placeholder="BPF"
              required
            >
            <datalist id="config-options"></datalist>
            <button type="submit">Search</button>
          </div>
        </form>
      </section>

      <section class="results" aria-live="polite">
        <div class="result-header">
          <h2 id="result-title">{{ result_title }}</h2>
          <span id="result-count">{{ result_count }}</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Distribution</th>
                <th>Package</th>
                <th>Value</th>
                <th>Versions / architectures</th>
                <th>Sources</th>
              </tr>
            </thead>
            <tbody id="results-body">
              {{ table_body | safe }}
            </tbody>
          </table>
        </div>
      </section>

      <section class="config-viewer" id="config-viewer"{% if config_viewer_hidden %} hidden{% endif %}>
        <div class="result-header">
          <h2 id="config-title">Config</h2>
          <a id="config-link" href="#">raw</a>
        </div>
        <pre id="config-body"></pre>
      </section>
    </main>
  </body>
</html>
