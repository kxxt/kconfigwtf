<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>kconfigwtf</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="app.js" data-index-manifest="indexes.json"></script>
  </head>
  <body>
    <main class="shell">
      <section class="lookup">
        <div>
          <h1>kconfigwtf</h1>
          <p class="lede">Find Linux kernel package configs by Kconfig entry.</p>
          <p class="site-links">
            <a href="https://github.com/kxxt/kconfigwtf">github.com/kxxt/kconfigwtf</a>
          </p>
        </div>
        <form id="search-form" class="search" role="search">
          <label for="config-input">Kernel config</label>
          <div class="search-row">
            <input
              id="config-input"
              name="config"
              type="search"
              list="config-options"
              autocomplete="off"
              spellcheck="false"
              placeholder="BPF"
              required
            >
            <datalist id="config-options"></datalist>
            <button type="submit">Search</button>
          </div>
        </form>
      </section>

      <section class="results" aria-live="polite">
        <div class="result-header">
          <div class="result-heading">
            <h2 id="result-title">Enter a config entry</h2>
            
          </div>
          <span id="result-count"></span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Distribution</th>
                <th>Release</th>
                <th>Package</th>
                <th>Value</th>
                <th>Versions / architectures</th>
                <th>Sources</th>
              </tr>
            </thead>
            <tbody id="results-body">
              <tr><td colspan="6" class="empty">No lookup has been run yet.</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="config-viewer" id="config-viewer" hidden>
        <div class="result-header">
          <h2 id="config-title">Config</h2>
          <a id="config-link" href="#" target="_blank" rel="noopener">raw</a>
        </div>
        <pre id="config-body"></pre>
      </section>
    </main>
  </body>
</html>
