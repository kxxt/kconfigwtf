name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  style:
    name: Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --workspace --all-features --all-targets --locked --lcov --output-path coverage.lcov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: coverage.lcov
          fail_ci_if_error: true
          verbose: true

  site-build:
    name: Site Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build static site
        run: cargo run --locked -- site --data-dir data --output-dir .ci/public --title kconfigwtf
      - name: Verify site output
        run: |
          test -f .ci/public/index.html
          test -f .ci/public/app.js
          test -f .ci/public/styles.css
          test -f .ci/public/indexes.json
          test -d .ci/public/data
      - name: Pack site artifact
        run: |
          mkdir -p .ci/artifact
          tar --directory .ci/public -cvf .ci/artifact/site-build.tar .
          gzip --force .ci/artifact/site-build.tar
      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: .ci/artifact/site-build.tar.gz
          if-no-files-found: error
