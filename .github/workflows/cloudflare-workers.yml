name: Cloudflare Workers

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: cloudflare-workers-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CLOUDFLARE_WORKER_NAME: kconfigwtf

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build static site
        run: cargo run --locked -- site --data-dir data --output-dir .ci/public --title kconfigwtf
      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4.68.0"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: deploy .ci/public --name=${{ env.CLOUDFLARE_WORKER_NAME }} --compatibility-date=2026-05-25
